name: Sync Sukka Clash Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync rules
        run: >-
          python3 scripts/sync_sukka_rules.py
          --github-repository "${{ github.repository }}"
          --branch "${{ github.event.repository.default_branch }}"

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- ruleset config/clash-rule-providers.yaml)" ]; then
            echo "No rule changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ruleset config/clash-rule-providers.yaml
          git commit -m "chore: sync Sukka Clash rules"
          git push
